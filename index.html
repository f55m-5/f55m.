<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سكربتاتي</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

html, body {
    touch-action: pan-y;
}

.page {
    display: none;
    padding: 15px;
    height: 100vh;
    overflow-y: auto;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: #fff;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #00ffcc;
    color: #000;
    font-weight: bold;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header h3 {
    color: #00ffcc;
    margin: 0;
}

.card {
    background: #111;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

.card pre {
    color: #aaa;
    white-space: pre-wrap;
}

.action-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}

.openBtn { background: #00bfff; color: #000; }
.copyBtn { background: #00ffcc; color: #000; }
.deleteBtn { background: #ff3b3b; color: #fff; }

/* Modal */
#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    padding: 15px;
    overflow: auto;
}

#modal pre {
    background: #111;
    padding: 10px;
    border-radius: 8px;
    white-space: pre-wrap;
}

/* Toast */
#toast {
    position: fixed;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    background: #00ffcc;
    color: #000;
    padding: 10px 20px;
    border-radius: 20px;
    transition: 0.3s;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="toast">تم النسخ</div>

<!-- LOGIN / REGISTER -->
<div id="loginPage" class="page">
    <h2>🔐 تسجيل دخول</h2>

    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة المرور">

    <button onclick="login()">تسجيل دخول</button>
    <button onclick="register()">إنشاء حساب</button>
</div>

<!-- APP -->
<div id="appPage" class="page">

    <div class="header">
        <h3>📁 سكربتاتي</h3>
        <button onclick="logout()" style="width:auto;padding:8px 12px;">خروج</button>
    </div>

    <input id="title" placeholder="اسم السكربت">
    <textarea id="code" placeholder="اكتب السكربت"></textarea>

    <button onclick="addScript()">حفظ</button>

    <div id="list"></div>
</div>

<!-- Modal -->
<div id="modal">
    <button onclick="closeModal()">إغلاق</button>
    <pre id="modalText"></pre>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");
let scripts = JSON.parse(localStorage.getItem("scripts") || "[]");
let currentUser = localStorage.getItem("currentUser");

/* عرض الصفحة */
if (currentUser) {
    document.getElementById("appPage").style.display = "block";
} else {
    document.getElementById("loginPage").style.display = "block";
}

/* 🔐 تسجيل دخول */
function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (users[u] && users[u] === p) {
        localStorage.setItem("currentUser", u);
        location.reload();
    } else {
        alert("بيانات غير صحيحة");
    }
}

/* 🆕 إنشاء حساب */
function register() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (!u || !p) return alert("اكتب البيانات");

    if (users[u]) return alert("المستخدم موجود");

    users[u] = p;
    localStorage.setItem("users", JSON.stringify(users));

    localStorage.setItem("currentUser", u);
    location.reload();
}

/* خروج */
function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

/* حفظ */
function addScript() {
    let title = document.getElementById("title").value;
    let code = document.getElementById("code").value;

    if (!title || !code) return alert("اكتب كل البيانات");

    scripts.push({ owner: currentUser, title, code });
    localStorage.setItem("scripts", JSON.stringify(scripts));

    render();
}

/* فتح */
function openScript(i) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modalText").innerText = scripts[i].code;
}

/* إغلاق */
function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* نسخ */
function copyTextById(i) {
    let text = scripts[i].code;

    navigator.clipboard.writeText(text).then(() => {
        showToast();
    }).catch(() => {
        let temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        showToast();
    });
}

/* حذف */
function deleteScript(i) {
    if (!confirm("هل أنت متأكد من حذف السكربت؟")) return;

    scripts.splice(i, 1);
    localStorage.setItem("scripts", JSON.stringify(scripts));
    render();
}

/* Toast */
function showToast() {
    let toast = document.getElementById("toast");
    toast.style.top = "20px";

    setTimeout(() => {
        toast.style.top = "-60px";
    }, 1500);
}

/* عرض */
function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    scripts
    .filter(s => s.owner === currentUser)
    .forEach((s, i) => {
        list.innerHTML += `
        <div class="card">
            <b>${s.title}</b>
            <pre>${s.code.substring(0, 80)}...</pre>

            <div class="action-buttons">
                <button class="openBtn" onclick="openScript(${i})">فتح</button>
                <button class="copyBtn" onclick="copyTextById(${i})">نسخ</button>
                <button class="deleteBtn" onclick="deleteScript(${i})">حذف</button>
            </div>
        </div>
        `;
    });
}

render();
</script>

</body>
</html>
